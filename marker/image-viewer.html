<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地图片查看器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #1a1a1a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #2a2a2a;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        .header h1 {
            font-size: 1.5rem;
            color: #4ade80;
        }

        .upload-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            border: 3px dashed #444;
            margin: 20px;
            border-radius: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .upload-area:hover,
        .upload-area.dragover {
            border-color: #4ade80;
            background: #1f291f;
        }

        .upload-icon {
            font-size: 64px;
            margin-bottom: 20px;
            color: #4ade80;
        }

        .upload-text {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 10px;
        }

        .upload-hint {
            font-size: 0.9rem;
            color: #666;
        }

        #fileInput {
            display: none;
        }

        .preview-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            overflow: hidden;
        }

        .preview-container.active {
            display: flex;
        }

        .image-wrapper {
            position: relative;
            display: inline-block;
        }

        .preview-image {
            max-width: 95vw;
            max-height: calc(100vh - 120px);
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.1s ease-out;
            transform-origin: 0 0;
            display: block;
            cursor: grab;
        }

        .preview-image:active {
            cursor: grabbing;
        }

        .hex-grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            border-radius: 8px;
            overflow: hidden;
            display: none;
            transform-origin: 0 0;
            transition: transform 0.1s ease-out;
        }

        .hex-grid-overlay.active {
            display: block;
            pointer-events: auto;
            cursor: crosshair;
        }

        .preview-info {
            margin-top: 15px;
            text-align: center;
            color: #888;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            align-items: center;
            background: rgba(42, 42, 42, 0.9);
            padding: 10px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            z-index: 1001;
            flex-wrap: wrap;
            justify-content: center;
        }

        .controls-main {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            max-height: 500px;
            opacity: 1;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .controls.hidden .controls-main {
            max-height: 0;
            opacity: 0;
            margin: 0;
            padding: 0;
        }

        .controls.hidden {
            padding-top: 0;
            padding-bottom: 0;
        }

        .palette-container {
            flex-shrink: 0;
        }

        .control-btn {
            background: #4ade80;
            color: #1a1a1a;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: opacity 0.3s ease;
        }

        .control-btn:hover {
            opacity: 0.8;
        }

        .control-btn.active {
            background: #4ade80;
            box-shadow: 0 0 10px rgba(74, 222, 128, 0.5);
        }

        .nav-btn {
            background: #2a2a2a;
            color: #fff;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: background 0.3s ease;
        }

        .nav-btn:hover {
            background: #3a3a3a;
        }

        .nav-btn:disabled {
            color: #444;
            cursor: not-allowed;
        }

        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .zoom-display {
            color: #fff;
            font-size: 0.85rem;
            min-width: 45px;
            text-align: center;
        }

        .zoom-btn {
            background: #3a3a3a;
            color: #fff;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s ease;
        }

        .zoom-btn:hover {
            background: #4a4a4a;
        }

        .zoom-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .grid-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .grid-controls-second {
            margin-top: 8px;
        }

        .grid-btn {
            background: #3a3a3a;
            color: #fff;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .grid-btn:hover {
            background: #4a4a4a;
        }

        .grid-btn.active {
            background: #4ade80;
            color: #1a1a1a;
        }

        .coord-btn {
            background: #3a3a3a;
            color: #fff;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .coord-btn:hover {
            background: #4a4a4a;
        }

        .coord-btn.active {
            background: #4ade80;
            color: #1a1a1a;
        }

        .export-btn {
            background: #60a5fa;
            color: #1a1a1a;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .export-btn:hover {
            background: #93c5fd;
        }


        /* 调色板样式 */
        .palette-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: 15px;
            padding-left: 15px;
            border-left: 1px solid #444;
        }

        .palette-label {
            font-size: 0.85rem;
            color: #888;
        }

        .palette-swatches {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .palette-swatch {
            width: 36px;
            height: 36px;
            border: 2px solid #3a3a3a;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .palette-swatch:hover {
            border-color: #4ade80;
            transform: scale(1.1);
        }

        .palette-swatch.active {
            border-color: #fff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .palette-swatch::after {
            content: attr(data-label);
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-top: 4px;
            padding: 4px 8px;
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            font-size: 0.75rem;
            border-radius: 4px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1002;
        }

        .palette-swatch:hover::after {
            opacity: 1;
        }

        /* 网格大小调整控件 */
        .size-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .size-control label {
            font-size: 0.85rem;
            color: #888;
            white-space: nowrap;
        }

        .size-slider {
            width: 100px;
            height: 8px;
            -webkit-appearance: none;
            appearance: none;
            background: #555;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }

        .size-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #4ade80;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 0 4px rgba(0, 0, 0, 0.5), 0 0 0 2px #2a2a2a;
        }

        .size-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 8px rgba(74, 222, 128, 0.6), 0 0 0 2px #2a2a2a;
        }

        .size-slider::-moz-range-track {
            width: 100px;
            height: 8px;
            background: #555;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }

        .size-slider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: #4ade80;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #2a2a2a;
            box-shadow: 0 0 4px rgba(0, 0, 0, 0.5);
        }

        .size-value {
            font-size: 0.85rem;
            color: #fff;
            min-width: 45px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📷 本地图片查看器</h1>
    </div>

    <div class="upload-area" id="uploadArea">
        <div class="upload-icon">📁</div>
        <div class="upload-text">点击选择图片或拖放图片到这里</div>
        <div class="upload-hint">支持 JPG、PNG、GIF、WEBP 等格式</div>
    </div>

    <input type="file" id="fileInput" accept="image/*" multiple>

    <div class="preview-container" id="previewContainer">
        <div class="controls" id="controls">
            <div class="controls-main" id="controlsMain">
                <div class="grid-controls">
                    <button class="control-btn" id="resetBtn">🔄 重置</button>
                    <div class="zoom-controls">
                        <button class="zoom-btn" id="zoomOutBtn" title="缩小">−</button>
                        <span class="zoom-display" id="zoomDisplay">100%</span>
                        <button class="zoom-btn" id="zoomInBtn" title="放大">+</button>
                        <button class="zoom-btn" id="zoomResetBtn" title="重置缩放">1:1</button>
                    </div>
                    <button class="grid-btn" id="gridBtn" title="显示/隐藏网格">⬡ 网格化</button>
                    <button class="coord-btn" id="coordBtn" title="显示/隐藏坐标">📍 坐标</button>
                    <div class="size-control">
                        <label for="sizeSlider">半径</label>
                        <input type="range" id="sizeSlider" class="size-slider" min="40" max="300" value="120" title="调整网格半径">
                        <span class="size-value" id="sizeValue">120</span>
                    </div>
                </div>
                <div class="grid-controls grid-controls-second">
                    <button class="export-btn" id="importBtn" title="导入坐标数据">📥 导入JSON</button>
                    <button class="export-btn" id="exportBtn" title="导出坐标数据">📤 导出JSON</button>
                    <button class="export-btn" id="exportSvgBtn" title="导出网格SVG矢量图">📥 导出SVG</button>
                    <button class="export-btn" id="exportPipelineBtn" title="导出 Pipeline 输入JSON" style="background:#f59e0b;">🚀 导出Pipeline JSON</button>
                    <input type="file" id="importFileInput" accept=".json" style="display: none;">
                </div>
            </div>
            <div class="palette-container" id="paletteContainer">
                <span class="palette-label">调色板</span>
                <div class="palette-swatches">
                    <div class="palette-swatch active" data-color="#4ade80" data-label="森林密集区" style="background-color: #4ade80;"></div>
                    <div class="palette-swatch" data-color="#ef4444" data-label="森林稀疏区" style="background-color: #ef4444;"></div>
                    <div class="palette-swatch" data-color="#3b82f6" data-label="水坑" style="background-color: #3b82f6;"></div>
                    <div class="palette-swatch" data-color="#eab308" data-label="干坑" style="background-color: #eab308;"></div>
                    <div class="palette-swatch" data-color="#a855f7" data-label="主路" style="background-color: #a855f7;"></div>
                    <div class="palette-swatch" data-color="#f97316" data-label="小路" style="background-color: #f97316;"></div>
                    <div class="palette-swatch" data-color="#06b6d4" data-label="盐沼" style="background-color: #06b6d4;"></div>
                </div>
            </div>
        </div>
        <div class="image-wrapper" id="imageWrapper">
            <img class="preview-image" id="previewImage" src="" alt="预览图片">
            <canvas class="hex-grid-overlay" id="hexGridCanvas"></canvas>
        </div>
        <div class="preview-info" id="previewInfo"></div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');
        const previewImage = document.getElementById('previewImage');
        const previewInfo = document.getElementById('previewInfo');
        const resetBtn = document.getElementById('resetBtn');
        const zoomOutBtn = document.getElementById('zoomOutBtn');
        const zoomInBtn = document.getElementById('zoomInBtn');
        const zoomResetBtn = document.getElementById('zoomResetBtn');
        const zoomDisplay = document.getElementById('zoomDisplay');
        const gridBtn = document.getElementById('gridBtn');
        const coordBtn = document.getElementById('coordBtn');
        const exportBtn = document.getElementById('exportBtn');
        const exportSvgBtn = document.getElementById('exportSvgBtn');
        const importBtn = document.getElementById('importBtn');
        const importFileInput = document.getElementById('importFileInput');
        const imageWrapper = document.getElementById('imageWrapper');
        const controls = document.getElementById('controls');
        const controlsMain = document.getElementById('controlsMain');
        const paletteContainer = document.getElementById('paletteContainer');
        const hexGridCanvas = document.getElementById('hexGridCanvas');
        const paletteSwatches = document.querySelectorAll('.palette-swatch');
        const sizeSlider = document.getElementById('sizeSlider');
        const sizeValue = document.getElementById('sizeValue');

        let loadedFiles = [];
        let currentIndex = -1;
        let currentZoom = 1.0;
        const zoomStep = 0.25;
        const minZoom = 0.1;
        const maxZoom = 10.0;
        let gridEnabled = false;
        let coordEnabled = false;
        let hexSize = 120; // 六边形半径
        let currentGridColor = '#4ade80'; // 当前选中的网格颜色
        let defaultGridColor = '#4ade80'; // 默认网格颜色
        let gridColorMap = new Map(); // 网格ID到颜色的映射
        let gridCoordinates = []; // 存储所有网格的坐标数据
        let selectedGridIds = new Set(); // 当前选中的网格ID集合（多选）
        let hoveredGridId = null; // 当前鼠标悬停的网格ID
        let controlsVisible = true; // 控制栏是否可见
        let controlsHoverTimer = null; // 控制栏悬停计时器

        // 颜色与编号的映射关系
        const colorToTagMap = new Map([
            ['#4ade80', 1], // 森林密集区（绿色）
            ['#ef4444', 2], // 森林稀疏区（红色）
            ['#3b82f6', 3], // 水坑（蓝色）
            ['#eab308', 4], // 干坑（黄色）
            ['#a855f7', 5], // 主路（紫色）
            ['#f97316', 6], // 小路（橙色）
            ['#06b6d4', 7]  // 盐沼（青色）
        ]);

        // 颜色与标签的映射关系
        const colorToLabelMap = new Map([
            ['#4ade80', '森林密集区'],
            ['#ef4444', '森林稀疏区'],
            ['#3b82f6', '水坑'],
            ['#eab308', '干坑'],
            ['#a855f7', '主路'],
            ['#f97316', '小路'],
            ['#06b6d4', '盐沼']
        ]);

        // 预设颜色列表（按顺序）
        const presetColors = [
            '#4ade80',
            '#ef4444',
            '#3b82f6',
            '#eab308',
            '#a855f7',
            '#f97316',
            '#06b6d4'
        ];

        // 框选相关变量
        let isSelecting = false;
        let selectionStartX = 0;
        let selectionStartY = 0;
        let selectionEndX = 0;
        let selectionEndY = 0;

        // 拖拽相关变量
        let isDragging = false;
        let startX = 0;
        let startY = 0;
        let panX = 0;
        let panY = 0;

        // 点击上传区域触发文件选择
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        // 文件选择处理
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        // 拖放处理
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        // 重置按钮
        resetBtn.addEventListener('click', () => {
            // 重置所有状态变量
            loadedFiles = [];
            currentIndex = -1;
            currentZoom = 1.0;
            panX = 0;
            panY = 0;
            gridEnabled = false;
            coordEnabled = false;
            currentGridColor = '#4ade80';
            defaultGridColor = '#4ade80';
            hexSize = 120;
            sizeSlider.value = hexSize;
            sizeValue.textContent = hexSize;
            gridColorMap.clear();
            selectedGridIds = new Set();
            gridCoordinates = [];
            isSelecting = false;
            isDragging = false;
            hoveredGridId = null;

            // 重置调色板选中状态
            updatePaletteActiveState(currentGridColor);

            // 重置 UI 状态 - 确保预览容器完全隐藏
            previewContainer.classList.remove('active');
            previewContainer.style.cssText = '';
            hexGridCanvas.classList.remove('active');
            gridBtn.classList.remove('active');
            coordBtn.classList.remove('active');

            // 清除样式
            previewImage.style.transform = 'none';
            hexGridCanvas.style.transform = 'none';

            // 清除图片和事件
            previewImage.onload = null;
            previewImage.src = '';
            fileInput.value = '';

            // 确保上传区域可见
            uploadArea.style.display = '';
        });

        // 缩放按钮
        zoomOutBtn.addEventListener('click', zoomOut);
        zoomInBtn.addEventListener('click', zoomIn);
        zoomResetBtn.addEventListener('click', resetZoom);

        // 网格按钮
        gridBtn.addEventListener('click', toggleGrid);
        // 坐标按钮
        coordBtn.addEventListener('click', toggleCoord);
        // 导出按钮
        exportBtn.addEventListener('click', exportCoordinates);
        // SVG导出按钮
        exportSvgBtn.addEventListener('click', exportGridSvg);
        // 导入按钮
        importBtn.addEventListener('click', () => {
            if (!previewContainer.classList.contains('active')) {
                alert('请先打开图片后再导入数据');
                return;
            }
            importFileInput.click();
        });
        // 导入文件选择
        importFileInput.addEventListener('change', handleImportFile);

        // 控制栏隐藏/显示事件
        controls.addEventListener('mouseenter', showControls);
        controls.addEventListener('mouseleave', handleControlsMouseLeave);

        // 初始隐藏控制栏（只保留调色板）
        hideControls();

        // 调色板色块点击事件
        paletteSwatches.forEach(swatch => {
            swatch.addEventListener('click', handlePaletteSwatchClick);
        });

        // 网格半径调整事件
        sizeSlider.addEventListener('input', handleSizeChange);

        // 网格鼠标事件 - 点击和框选
        hexGridCanvas.addEventListener('mousedown', handleGridMouseDown);
        hexGridCanvas.addEventListener('mousemove', handleGridMouseMove);
        hexGridCanvas.addEventListener('mouseup', handleGridMouseUp);
        hexGridCanvas.addEventListener('mouseleave', handleGridMouseLeave);

        // 鼠标滚轮缩放
        previewContainer.addEventListener('wheel', (e) => {
            if (!previewContainer.classList.contains('active')) return;
            if (e.ctrlKey || e.metaKey) {
                e.preventDefault();
                if (e.deltaY < 0) {
                    zoomIn();
                } else {
                    zoomOut();
                }
            }
        });

        // 拖拽功能 - 左键按下开始拖拽
        imageWrapper.addEventListener('mousedown', (e) => {
            if (!previewContainer.classList.contains('active')) return;
            // 只在左键按下时允许拖拽
            if (e.button !== 0) return;
            // 只在缩放大于1时允许拖拽
            if (currentZoom <= 1.0) return;
            // 只在图片上点击时才允许拖拽（网格层点击用于选择网格）
            if (e.target !== previewImage) return;

            isDragging = true;
            startX = e.clientX - panX;
            startY = e.clientY - panY;
            e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;

            e.preventDefault();
            panX = e.clientX - startX;
            panY = e.clientY - startY;
            applyTransform();
        });

        // 松开鼠标停止拖拽
        document.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
            }
        });

        // 键盘导航
        document.addEventListener('keydown', (e) => {
            if (!previewContainer.classList.contains('active')) return;

            if (e.key === 'ArrowLeft' && currentIndex > 0) {
                showPreview(currentIndex - 1);
            } else if (e.key === 'ArrowRight' && currentIndex < loadedFiles.length - 1) {
                showPreview(currentIndex + 1);
            } else if (e.key === '+' || e.key === '=') {
                zoomIn();
            } else if (e.key === '-' || e.key === '_') {
                zoomOut();
            } else if (e.key === '0') {
                resetZoom();
            } else if (e.key === 'g' || e.key === 'G') {
                toggleGrid();
            }
        });

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const fileData = {
                            name: file.name,
                            size: file.size,
                            dataUrl: e.target.result
                        };
                        loadedFiles.push(fileData);

                        // 如果是第一张图片，直接显示
                        if (loadedFiles.length === 1) {
                            showPreview(0);
                        }
                    };
                    reader.readAsDataURL(file);
                } else {
                    alert(`"${file.name}" 不是图片文件`);
                }
            });
        }

        function showPreview(index) {
            if (index < 0 || index >= loadedFiles.length) return;

            currentIndex = index;
            const file = loadedFiles[index];

            // 重置选中状态
            selectedGridIds.clear();

            previewInfo.textContent = `${file.name} - ${formatSize(file.size)}`;
            previewContainer.classList.add('active');
            uploadArea.style.display = 'none';

            // 先设置 src，然后检查图片是否已加载完成
            previewImage.src = file.dataUrl;

            // 如果图片已经加载完成（比如从缓存），直接执行后续逻辑
            if (previewImage.complete && previewImage.naturalWidth > 0) {
                resetZoom();
                if (gridEnabled) {
                    drawHexGrid();
                }
            } else {
                // 否则等待加载完成
                previewImage.onload = () => {
                    resetZoom();
                    if (gridEnabled) {
                        drawHexGrid();
                    }
                };
            }
        }

        function zoomIn() {
            if (currentZoom < maxZoom) {
                currentZoom = Math.min(currentZoom + zoomStep, maxZoom);
                applyTransform();
                updateZoomDisplay();
                updateZoomButtons();
            }
        }

        function zoomOut() {
            if (currentZoom > minZoom) {
                currentZoom = Math.max(currentZoom - zoomStep, minZoom);
                // 缩放小于等于1时重置拖拽位置
                if (currentZoom <= 1.0) {
                    resetPan();
                }
                applyTransform();
                updateZoomDisplay();
                updateZoomButtons();
            }
        }

        function resetZoom() {
            currentZoom = 1.0;
            resetPan();
            applyTransform();
            updateZoomDisplay();
            updateZoomButtons();
        }

        function resetPan() {
            panX = 0;
            panY = 0;
        }

        function updateZoomDisplay() {
            zoomDisplay.textContent = Math.round(currentZoom * 100) + '%';
        }

        function applyTransform() {
            const transform = `translate(${panX}px, ${panY}px) scale(${currentZoom})`;
            previewImage.style.transform = transform;
            hexGridCanvas.style.transform = transform;
        }

        function updateZoomButtons() {
            zoomOutBtn.disabled = currentZoom <= minZoom;
            zoomInBtn.disabled = currentZoom >= maxZoom;
        }

        function toggleGrid() {
            gridEnabled = !gridEnabled;
            gridBtn.classList.toggle('active', gridEnabled);

            if (gridEnabled) {
                hexGridCanvas.classList.add('active');
                drawHexGrid();
            } else {
                hexGridCanvas.classList.remove('active');
            }
        }

        function toggleCoord() {
            coordEnabled = !coordEnabled;
            coordBtn.classList.toggle('active', coordEnabled);

            if (gridEnabled) {
                drawHexGrid();
            }
        }

        // 隐藏控制栏（只保留调色板）
        function hideControls() {
            if (controlsHoverTimer) {
                clearTimeout(controlsHoverTimer);
                controlsHoverTimer = null;
            }
            controlsVisible = false;
            controls.classList.add('hidden');
        }

        // 显示控制栏
        function showControls() {
            if (controlsHoverTimer) {
                clearTimeout(controlsHoverTimer);
                controlsHoverTimer = null;
            }
            controlsVisible = true;
            controls.classList.remove('hidden');
        }

        // 处理控制栏鼠标离开
        function handleControlsMouseLeave() {
            controlsHoverTimer = setTimeout(() => {
                hideControls();
            }, 300);
        }

        function exportCoordinates() {
            if (gridCoordinates.length === 0) {
                alert('请先开启网格化以生成坐标数据');
                return;
            }

            // 导出所有网格，有颜色的填颜色，没颜色的color设为#000000，colorTag设为0
            const gridsToExport = gridCoordinates
                .map(grid => {
                    const hasColor = gridColorMap.has(grid.gridId);
                    const color = hasColor ? gridColorMap.get(grid.gridId) : '#000000';
                    const colorTag = hasColor ? (colorToTagMap.get(color) || 0) : 0;
                    return {
                        ...grid,
                        color: color,
                        colorTag: colorTag
                    };
                });

            const dataStr = JSON.stringify(gridsToExport, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'grid-coordinates.json';
            link.click();
            URL.revokeObjectURL(url);
        }

        function exportGridSvg() {
            if (gridCoordinates.length === 0) {
                alert('请先开启网格化以生成坐标数据');
                return;
            }

            const naturalWidth = previewImage.naturalWidth;
            const naturalHeight = previewImage.naturalHeight;
            const r = hexSize; // 使用自然尺寸的六边形半径
            const xDist = r * Math.sqrt(3);
            const yDist = r * 1.5;

            // Legend配置 - 根据图片尺寸动态计算
            const minDimension = Math.min(naturalWidth, naturalHeight);
            const legendFontSize = Math.max(12, Math.round(minDimension / 40));
            const legendItemHeight = Math.round(legendFontSize * 2);
            const legendPadding = Math.round(legendFontSize * 0.8);
            const legendColorBoxSize = Math.round(legendFontSize * 1.4);
            const legendTextMargin = Math.round(legendFontSize * 0.6);
            const legendItems = presetColors.length;
            const legendWidth = Math.round(legendFontSize * 11);
            const legendHeight = legendPadding * 2 + legendItems * legendItemHeight;
            const legendMargin = Math.round(legendFontSize * 1.5);
            const legendX = naturalWidth - legendWidth - legendMargin;
            const legendY = naturalHeight - legendHeight - legendMargin;

            // 构建SVG
            let svgContent = `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${naturalWidth} ${naturalHeight}" width="${naturalWidth}" height="${naturalHeight}">
  <!-- Hex Grid Layer -->
`;

            // 为所有网格生成六边形
            for (const grid of gridCoordinates) {
                const row = grid.row;
                const col = grid.col;
                const centerX = col * xDist + (row % 2 === 1 ? xDist / 2 : 0);
                const centerY = row * yDist;
                const hasColor = gridColorMap.has(grid.gridId);
                const color = hasColor ? gridColorMap.get(grid.gridId) : 'none';

                // 计算六边形顶点
                let points = [];
                for (let i = 0; i < 6; i++) {
                    const angle = (Math.PI / 3) * i - Math.PI / 6;
                    const x = centerX + r * Math.cos(angle);
                    const y = centerY + r * Math.sin(angle);
                    points.push(`${x},${y}`);
                }

                if (hasColor) {
                    svgContent += `  <polygon points="${points.join(' ')}" fill="${color}" fill-opacity="0.8" stroke="#000000" stroke-opacity="1" stroke-width="1" data-grid-id="${grid.gridId}"/>
`;
                } else {
                    svgContent += `  <polygon points="${points.join(' ')}" fill="none" stroke="#000000" stroke-opacity="1" stroke-width="1" data-grid-id="${grid.gridId}"/>
`;
                }
            }

            // 添加Legend
            svgContent += `
  <!-- Legend -->
  <g transform="translate(${legendX}, ${legendY})">
    <!-- Legend背景（半透明） -->
    <rect x="0" y="0" width="${legendWidth}" height="${legendHeight}" fill="rgba(0,0,0,0.5)" rx="5" ry="5"/>
`;

            // 添加Legend项目
            presetColors.forEach((color, index) => {
                const label = colorToLabelMap.get(color);
                const itemY = legendPadding + index * legendItemHeight;
                const colorBoxY = itemY + (legendItemHeight - legendColorBoxSize) / 2;
                const textY = itemY + legendItemHeight - (legendItemHeight - legendFontSize) / 2 - Math.round(legendFontSize * 0.15);

                svgContent += `    <!-- ${label} -->
    <rect x="${legendPadding}" y="${colorBoxY}" width="${legendColorBoxSize}" height="${legendColorBoxSize}" fill="${color}" fill-opacity="0.8" stroke="#000000" stroke-opacity="1" stroke-width="1"/>
    <text x="${legendPadding + legendColorBoxSize + legendTextMargin}" y="${textY}" font-family="sans-serif" font-size="${legendFontSize}" fill="#ffffff">${label}</text>
`;
            });

            svgContent += `  </g>
</svg>`;

            // 下载SVG
            const dataBlob = new Blob([svgContent], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'grid-layer.svg';
            link.click();
            URL.revokeObjectURL(url);
        }

        // 处理导入文件
        function handleImportFile(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const importedData = JSON.parse(event.target.result);

                    if (!Array.isArray(importedData) || importedData.length === 0) {
                        alert('导入的数据格式不正确，请确保是有效的JSON数组');
                        return;
                    }

                    // 验证数据格式
                    const firstGrid = importedData[0];
                    if (!firstGrid.hasOwnProperty('row') || !firstGrid.hasOwnProperty('col') ||
                        (!firstGrid.hasOwnProperty('color') && !firstGrid.hasOwnProperty('colorTag'))) {
                        alert('导入的数据格式不正确，需要包含row、col和color/colorTag字段');
                        return;
                    }

                    // 从导入数据中获取网格半径并设置
                    if (firstGrid.hasOwnProperty('hexSizeNatural')) {
                        const importedHexSize = parseInt(firstGrid.hexSizeNatural);
                        if (!isNaN(importedHexSize) && importedHexSize >= 40 && importedHexSize <= 300) {
                            hexSize = importedHexSize;
                            sizeSlider.value = hexSize;
                            sizeValue.textContent = hexSize;
                        }
                    }

                    // 清空现有的颜色映射和选中状态
                    gridColorMap.clear();
                    selectedGridIds.clear();

                    // 启用网格
                    if (!gridEnabled) {
                        gridEnabled = true;
                        gridBtn.classList.add('active');
                        hexGridCanvas.classList.add('active');
                    }

                    // 先生成网格（使用导入的半径）
                    drawHexGrid();

                    // 按照行和列匹配网格并填充颜色
                    let filledCount = 0;
                    for (const importedGrid of importedData) {
                        // 查找匹配的网格（通过row和col）
                        const matchingGrid = gridCoordinates.find(g => g.row === importedGrid.row && g.col === importedGrid.col);
                        if (matchingGrid) {
                            let colorToUse = null;

                            // 优先使用color字段，如果没有则使用colorTag映射
                            if (importedGrid.color) {
                                colorToUse = importedGrid.color;
                            } else if (importedGrid.colorTag) {
                                // 根据colorTag找到对应的颜色
                                for (const [color, tag] of colorToTagMap) {
                                    if (tag === importedGrid.colorTag) {
                                        colorToUse = color;
                                        break;
                                    }
                                }
                            }

                            if (colorToUse && presetColors.includes(colorToUse)) {
                                gridColorMap.set(matchingGrid.gridId, colorToUse);
                                filledCount++;
                            }
                        }
                    }

                    // 重绘网格以显示颜色
                    drawHexGrid();

                    alert(`成功导入 ${filledCount} 个网格的颜色数据`);

                } catch (error) {
                    alert('导入失败：' + error.message);
                    console.error('Import error:', error);
                }
            };

            reader.onerror = function() {
                alert('文件读取失败');
            };

            reader.readAsText(file);
            e.target.value = ''; // 清空input以便再次选择同一文件
        }

        function drawHexGrid() {
            // 清空坐标数据
            gridCoordinates = [];
            const gridMap = new Map();

            // 获取图片的显示尺寸
            let displayWidth = previewImage.offsetWidth || previewImage.clientWidth;
            let displayHeight = previewImage.offsetHeight || previewImage.clientHeight;
            const naturalWidth = previewImage.naturalWidth;
            const naturalHeight = previewImage.naturalHeight;

            // 如果还没有显示尺寸，使用 naturalWidth/naturalHeight 计算
            if (displayWidth === 0 || displayHeight === 0) {
                // 计算图片适应屏幕的尺寸
                const maxWidth = window.innerWidth * 0.95;
                const maxHeight = window.innerHeight - 120;
                const scale = Math.min(maxWidth / naturalWidth, maxHeight / naturalHeight, 1.0);
                displayWidth = naturalWidth * scale;
                displayHeight = naturalHeight * scale;
            }

            if (displayWidth === 0 || displayHeight === 0) return;

            // 设置 Canvas 的实际尺寸和显示尺寸都匹配图片的显示尺寸
            hexGridCanvas.width = displayWidth;
            hexGridCanvas.height = displayHeight;
            hexGridCanvas.style.width = displayWidth + 'px';
            hexGridCanvas.style.height = displayHeight + 'px';

            const ctx = hexGridCanvas.getContext('2d');
            ctx.clearRect(0, 0, displayWidth, displayHeight);

            // 计算缩放比例 - 六边形大小需要根据图片缩放比例调整
            const imageScale = displayWidth / naturalWidth;

            // 六边形尺寸计算 - 根据图片缩放比例调整
            const r = hexSize * imageScale; // 中心到顶点的距离
            const xDist = r * Math.sqrt(3); // 水平间距
            const yDist = r * 1.5; // 垂直间距

            // 绘制六边形网格
            const cols = Math.ceil(displayWidth / xDist) + 2;
            const rows = Math.ceil(displayHeight / yDist) + 2;

            // 第一步：生成所有网格并存入 map
            for (let row = -1; row < rows; row++) {
                for (let col = -1; col < cols; col++) {
                    // 奇数行向右偏移一半水平间距
                    const centerX = col * xDist + (row % 2 === 1 ? xDist / 2 : 0);
                    const centerY = row * yDist;

                    // 只绘制与图片区域有重叠的六边形
                    if (centerX + r < 0 || centerX - r > displayWidth ||
                        centerY + r < 0 || centerY - r > displayHeight) {
                        continue;
                    }

                    // 计算坐标 - 原点在右下角，第一象限
                    // 图片右下角为 (0, 0)，向左为 x 轴正方向，向上为 y 轴正方向
                    // 坐标使用自然尺寸（不是显示尺寸）
                    const naturalCenterX = centerX / imageScale;
                    const naturalCenterY = centerY / imageScale;
                    const coordX = naturalWidth - naturalCenterX;
                    const coordY = naturalHeight - naturalCenterY;

                    const gridId = `${row}_${col}`;

                    // 保存坐标数据
                    const gridData = {
                        gridId: gridId,
                        row: row,
                        col: col,
                        x: coordX,
                        y: coordY,
                        centerXNatural: naturalCenterX,
                        centerYNatural: naturalCenterY,
                        hexSizeNatural: hexSize,
                        neighbors: []
                    };

                    gridCoordinates.push(gridData);
                    gridMap.set(gridData.gridId, gridData);
                }
            }

            // 第二步：为每个网格计算邻居
            for (const gridData of gridCoordinates) {
                const row = gridData.row;
                const col = gridData.col;
                const neighbors = [];

                // 六边形网格的六个邻居偏移
                let neighborOffsets;
                if (row % 2 === 0) {
                    // 偶数行
                    neighborOffsets = [
                        [-1, 0],    // 左上
                        [-1, -1],   // 右上
                        [0, -1],    // 左
                        [0, 1],     // 右
                        [1, 0],     // 左下
                        [1, -1]     // 右下
                    ];
                } else {
                    // 奇数行
                    neighborOffsets = [
                        [-1, 1],    // 左上
                        [-1, 0],    // 右上
                        [0, -1],    // 左
                        [0, 1],     // 右
                        [1, 1],     // 左下
                        [1, 0]      // 右下
                    ];
                }

                // 查找邻居
                for (const [dr, dc] of neighborOffsets) {
                    const neighborRow = row + dr;
                    const neighborCol = col + dc;
                    const neighborId = `${neighborRow}_${neighborCol}`;
                    if (gridMap.has(neighborId)) {
                        neighbors.push(neighborId);
                    }
                }

                gridData.neighbors = neighbors;
            }

            // 第三步：绘制所有网格
            // 首先获取悬停网格的邻居集合
            const neighborGridIds = new Set();
            let hoveredGridDisplayCenter = null;
            let hoveredGridIdText = null;
            if (hoveredGridId) {
                const hoveredGrid = gridCoordinates.find(g => g.gridId === hoveredGridId);
                if (hoveredGrid && hoveredGrid.neighbors) {
                    for (const neighborId of hoveredGrid.neighbors) {
                        neighborGridIds.add(neighborId);
                    }
                    // 保存悬停网格的显示坐标和ID
                    const hRow = hoveredGrid.row;
                    const hCol = hoveredGrid.col;
                    hoveredGridDisplayCenter = {
                        x: hCol * xDist + (hRow % 2 === 1 ? xDist / 2 : 0),
                        y: hRow * yDist
                    };
                    hoveredGridIdText = hoveredGrid.gridId;
                }
            }

            for (const gridData of gridCoordinates) {
                const row = gridData.row;
                const col = gridData.col;
                const centerX = col * xDist + (row % 2 === 1 ? xDist / 2 : 0);
                const centerY = row * yDist;
                const gridId = gridData.gridId;

                const isHighlighted = selectedGridIds.has(gridId);
                const hasCustomColor = gridColorMap.has(gridId);
                const isNeighbor = neighborGridIds.has(gridId);

                // 获取网格颜色，使用颜色映射或默认颜色
                const gridColor = gridColorMap.get(gridId) || defaultGridColor;

                // 绘制六边形（有自定义颜色的网格一直保持填充，邻居网格加粗边框）
                drawHexagon(ctx, centerX, centerY, r, isHighlighted, gridColor, hasCustomColor, isNeighbor);

                // 如果开启了坐标显示，绘制坐标标签
                if (coordEnabled) {
                    ctx.fillStyle = isHighlighted ? 'rgba(255, 255, 255, 1)' : 'rgba(255, 255, 255, 0.9)';
                    ctx.font = `${Math.max(10, r / 3)}px monospace`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    const label = `(${Math.round(gridData.x)}, ${Math.round(gridData.y)})`;
                    ctx.fillText(label, centerX, centerY);
                }
            }

            // 绘制悬停网格的网格ID
            if (hoveredGridDisplayCenter && hoveredGridIdText) {
                ctx.fillStyle = 'rgba(255, 255, 255, 1)';
                ctx.font = `bold ${Math.max(12, r / 2.5)}px monospace`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                // 绘制文字阴影以提高可读性
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillText(hoveredGridIdText, hoveredGridDisplayCenter.x + 1, hoveredGridDisplayCenter.y + 1);
                ctx.fillStyle = 'rgba(255, 255, 255, 1)';
                ctx.fillText(hoveredGridIdText, hoveredGridDisplayCenter.x, hoveredGridDisplayCenter.y);
            }

            // 绘制选择框
            if (isSelecting) {
                const selLeft = Math.min(selectionStartX, selectionEndX);
                const selTop = Math.min(selectionStartY, selectionEndY);
                const selWidth = Math.abs(selectionEndX - selectionStartX);
                const selHeight = Math.abs(selectionEndY - selectionStartY);

                // 绘制半透明填充
                ctx.fillStyle = hexToRgba(currentGridColor, 0.15);
                ctx.fillRect(selLeft, selTop, selWidth, selHeight);

                // 绘制边框（黑色）
                ctx.strokeStyle = "rgba(0, 0, 0, 0.8)";
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.strokeRect(selLeft, selTop, selWidth, selHeight);
                ctx.setLineDash([]);
            }
        }

        // 将十六进制颜色转换为 rgba 格式
        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        // 处理颜色变化
        function handleColorChange(e) {
            currentGridColor = e.target.value;

            // 更新调色板选中状态
            updatePaletteActiveState(currentGridColor);

            // 如果有选中的网格，只改变选中网格的颜色
            if (selectedGridIds.size > 0) {
                for (const gridId of selectedGridIds) {
                    gridColorMap.set(gridId, currentGridColor);
                }
            } else {
                // 如果没有选中网格，设置为默认颜色（新网格将使用此颜色）
                defaultGridColor = currentGridColor;
            }

            if (gridEnabled) {
                drawHexGrid();
            }
        }

        // 处理调色板色块点击
        function handlePaletteSwatchClick(e) {
            const swatch = e.target;
            const color = swatch.dataset.color;

            // 更新当前选中颜色
            currentGridColor = color;

            // 更新调色板选中状态
            updatePaletteActiveState(color);

            // 如果有选中的网格，填充选中的网格
            if (selectedGridIds.size > 0) {
                for (const gridId of selectedGridIds) {
                    gridColorMap.set(gridId, color);
                }
            } else {
                // 如果没有选中网格，设置为默认颜色
                defaultGridColor = color;
            }

            if (gridEnabled) {
                drawHexGrid();
            }
        }

        // 更新调色板选中状态
        function updatePaletteActiveState(selectedColor) {
            paletteSwatches.forEach(swatch => {
                if (swatch.dataset.color.toLowerCase() === selectedColor.toLowerCase()) {
                    swatch.classList.add('active');
                } else {
                    swatch.classList.remove('active');
                }
            });
        }

        // 处理网格半径变化
        function handleSizeChange(e) {
            hexSize = parseInt(e.target.value);
            sizeValue.textContent = hexSize;

            // 清空颜色映射和选中状态，因为网格布局改变了
            gridColorMap.clear();
            selectedGridIds.clear();

            // 如果网格已启用，重新绘制网格
            if (gridEnabled) {
                drawHexGrid();
            }
        }

        function drawHexagon(ctx, centerX, centerY, size, isHighlighted = false, color = defaultGridColor, hasCustomColor = false, isNeighbor = false) {
            ctx.beginPath();
            // 六边形顶点，从-30度开始（尖顶朝上）
            for (let i = 0; i < 6; i++) {
                const angle = (Math.PI / 3) * i - Math.PI / 6;
                const x = centerX + size * Math.cos(angle);
                const y = centerY + size * Math.sin(angle);
                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
            ctx.closePath();

            if (hasCustomColor || isHighlighted) {
                // 有自定义颜色或选中状态：填充+黑色边框
                ctx.fillStyle = hexToRgba(color, 0.8);
                ctx.fill();
                ctx.strokeStyle = "rgba(0, 0, 0, 1)";
                ctx.lineWidth = isHighlighted ? 2 : (isNeighbor ? 2 : 1);
            } else {
                // 普通样式：只有黑色边框
                ctx.strokeStyle = "rgba(0, 0, 0, 0.5)";
                ctx.lineWidth = isNeighbor ? 2 : 1;
            }
            ctx.stroke();
        }

        // 判断点是否在六边形内
        function isPointInHexagon(px, py, centerX, centerY, size) {
            const dx = Math.abs(px - centerX);
            const dy = Math.abs(py - centerY);
            const size3_2 = size * Math.sqrt(3) / 2;

            // 快速排除
            if (dx > size || dy > size3_2) return false;

            // 六边形内判断
            return (size3_2 * dx + size * dy / 2) <= size * size3_2;
        }

        // 获取网格在画布上的中心坐标
        function getGridDisplayCenter(grid, imageScale) {
            const r = hexSize * imageScale;
            const xDist = r * Math.sqrt(3);
            const yDist = r * 1.5;
            return {
                x: grid.col * xDist + (grid.row % 2 === 1 ? xDist / 2 : 0),
                y: grid.row * yDist
            };
        }

        // 判断网格是否与矩形区域相交（简化的AABB检测）
        function isGridInRectangle(grid, rectLeft, rectTop, rectRight, rectBottom, imageScale) {
            const r = hexSize * imageScale;
            const center = getGridDisplayCenter(grid, imageScale);

            // 使用六边形外接矩形进行AABB检测
            const hexLeft = center.x - r;
            const hexRight = center.x + r;
            const hexTop = center.y - r * Math.sqrt(3) / 2;
            const hexBottom = center.y + r * Math.sqrt(3) / 2;

            return !(hexRight < rectLeft || hexLeft > rectRight ||
                     hexBottom < rectTop || hexTop > rectBottom);
        }

        // 处理网格鼠标按下
        function handleGridMouseDown(e) {
            if (!gridEnabled) return;
            if (e.button !== 0) return; // 只处理左键

            const rect = hexGridCanvas.getBoundingClientRect();
            // 调整鼠标坐标以适应当前缩放级别
            selectionStartX = (e.clientX - rect.left) / currentZoom;
            selectionStartY = (e.clientY - rect.top) / currentZoom;
            selectionEndX = selectionStartX;
            selectionEndY = selectionStartY;
            isSelecting = true;

            // 如果没有按 Ctrl/Cmd，先清空选中
            if (!e.ctrlKey && !e.metaKey) {
                selectedGridIds.clear();
            }
        }

        // 处理网格鼠标移动
        function handleGridMouseMove(e) {
            if (!gridEnabled) return;

            const rect = hexGridCanvas.getBoundingClientRect();
            const mouseX = (e.clientX - rect.left) / currentZoom;
            const mouseY = (e.clientY - rect.top) / currentZoom;

            // 处理框选
            if (isSelecting) {
                selectionEndX = mouseX;
                selectionEndY = mouseY;
            }

            // 处理鼠标悬停检测
            const displayWidth = previewImage.offsetWidth || previewImage.clientWidth;
            const naturalWidth = previewImage.naturalWidth;
            const imageScale = displayWidth / naturalWidth;
            const r = hexSize * imageScale;

            let foundHoveredGrid = null;
            for (const grid of gridCoordinates) {
                const center = getGridDisplayCenter(grid, imageScale);
                if (isPointInHexagon(mouseX, mouseY, center.x, center.y, r)) {
                    foundHoveredGrid = grid;
                    break;
                }
            }

            const newHoveredGridId = foundHoveredGrid ? foundHoveredGrid.gridId : null;
            if (newHoveredGridId !== hoveredGridId) {
                hoveredGridId = newHoveredGridId;
                drawHexGrid(); // 重绘以更新邻居高亮
            } else if (isSelecting) {
                drawHexGrid(); // 重绘以显示选择框
            }
        }

        // 处理网格鼠标离开
        function handleGridMouseLeave() {
            if (hoveredGridId !== null) {
                hoveredGridId = null;
                if (gridEnabled) {
                    drawHexGrid(); // 重绘以清除邻居高亮
                }
            }
        }

        // 处理网格鼠标抬起
        function handleGridMouseUp(e) {
            if (!isSelecting || !gridEnabled) return;

            const rect = hexGridCanvas.getBoundingClientRect();
            // 调整鼠标坐标以适应当前缩放级别
            const endX = (e.clientX - rect.left) / currentZoom;
            const endY = (e.clientY - rect.top) / currentZoom;

            const dx = Math.abs(endX - selectionStartX) * currentZoom; // 使用缩放后的距离判断
            const dy = Math.abs(endY - selectionStartY) * currentZoom;

            // 计算缩放和偏移的反向变换
            const displayWidth = previewImage.offsetWidth || previewImage.clientWidth;
            const naturalWidth = previewImage.naturalWidth;
            const imageScale = displayWidth / naturalWidth;
            const r = hexSize * imageScale;

            if (dx < 5 && dy < 5) {
                // 点击操作（移动距离太小）
                handleSingleGridClick(endX, endY, imageScale, r, e.ctrlKey || e.metaKey || e.shiftKey);
            } else {
                // 框选操作
                const left = Math.min(selectionStartX, endX);
                const top = Math.min(selectionStartY, endY);
                const right = Math.max(selectionStartX, endX);
                const bottom = Math.max(selectionStartY, endY);

                handleRectangleSelection(left, top, right, bottom, imageScale, e.ctrlKey || e.metaKey || e.shiftKey);
            }

            isSelecting = false;
            drawHexGrid(); // 重绘以更新高亮
        }

        // 处理单个网格点击
        function handleSingleGridClick(clickX, clickY, imageScale, r, isMultiSelect) {
            const xDist = r * Math.sqrt(3);
            const yDist = r * 1.5;

            // 查找点击的网格
            let foundGrid = null;
            for (const grid of gridCoordinates) {
                const center = getGridDisplayCenter(grid, imageScale);

                if (isPointInHexagon(clickX, clickY, center.x, center.y, r)) {
                    foundGrid = grid;
                    break;
                }
            }

            // 切换选中状态和填色状态
            if (foundGrid) {
                if (isMultiSelect) {
                    // Ctrl/Cmd+点击：追加/取消选中
                    if (selectedGridIds.has(foundGrid.gridId)) {
                        selectedGridIds.delete(foundGrid.gridId);
                    } else {
                        selectedGridIds.add(foundGrid.gridId);
                    }
                } else {
                    // 普通点击：切换填色状态
                    if (gridColorMap.has(foundGrid.gridId)) {
                        // 已有填色，取消填色
                        gridColorMap.delete(foundGrid.gridId);
                        selectedGridIds.clear();
                    } else {
                        // 没有填色，使用当前颜色填充
                        selectedGridIds.clear();
                        selectedGridIds.add(foundGrid.gridId);
                        gridColorMap.set(foundGrid.gridId, currentGridColor);
                    }
                }
            } else if (!isMultiSelect) {
                selectedGridIds.clear(); // 点击空白处取消全部选中
            }
        }

        // 处理矩形框选
        function handleRectangleSelection(left, top, right, bottom, imageScale, isAdditive) {
            if (!isAdditive) {
                selectedGridIds.clear();
            }

            for (const grid of gridCoordinates) {
                if (isGridInRectangle(grid, left, top, right, bottom, imageScale)) {
                    selectedGridIds.add(grid.gridId);
                    // 使用当前颜色填充选中的网格
                    gridColorMap.set(grid.gridId, currentGridColor);
                }
            }
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

        // =====================================================================
        // Pipeline JSON 导出
        // =====================================================================

        // 颜色 → hexdynamic 地形类型
        const colorToTerrainType = new Map([
            ['#4ade80', 'DenseGrass'],
            ['#ef4444', 'SparseGrass'],
            ['#3b82f6', 'WaterHole'],
            ['#eab308', 'SaltMarsh'],
            ['#a855f7', 'Road'],
            ['#f97316', 'Road'],
            ['#06b6d4', 'SaltMarsh']
        ]);

        // 颜色 → riskIndex vegetation_type
        const colorToVegetationType = new Map([
            ['#4ade80', 'FOREST'],
            ['#ef4444', 'GRASSLAND'],
            ['#3b82f6', 'SHRUB'],
            ['#eab308', 'SHRUB'],
            ['#a855f7', 'GRASSLAND'],
            ['#f97316', 'GRASSLAND'],
            ['#06b6d4', 'SHRUB']
        ]);

        // 颜色 → 默认 fire_risk / terrain_complexity
        const colorToEnvDefaults = new Map([
            ['#4ade80', { fire_risk: 0.6, terrain_complexity: 0.5 }],
            ['#ef4444', { fire_risk: 0.3, terrain_complexity: 0.2 }],
            ['#3b82f6', { fire_risk: 0.1, terrain_complexity: 0.2 }],
            ['#eab308', { fire_risk: 0.2, terrain_complexity: 0.3 }],
            ['#a855f7', { fire_risk: 0.2, terrain_complexity: 0.1 }],
            ['#f97316', { fire_risk: 0.2, terrain_complexity: 0.1 }],
            ['#06b6d4', { fire_risk: 0.1, terrain_complexity: 0.4 }]
        ]);

        // 颜色 → 默认 species_densities
        const colorToSpeciesDensities = new Map([
            ['#4ade80', { rhino: 0.7, elephant: 0.5, bird: 0.4 }],
            ['#ef4444', { rhino: 0.4, elephant: 0.3, bird: 0.5 }],
            ['#3b82f6', { rhino: 0.8, elephant: 0.7, bird: 0.9 }],
            ['#eab308', { rhino: 0.2, elephant: 0.1, bird: 0.3 }],
            ['#a855f7', { rhino: 0.2, elephant: 0.2, bird: 0.3 }],
            ['#f97316', { rhino: 0.2, elephant: 0.2, bird: 0.3 }],
            ['#06b6d4', { rhino: 0.2, elephant: 0.1, bird: 0.6 }]
        ]);

        document.getElementById('exportPipelineBtn').addEventListener('click', () => {
            if (gridCoordinates.length === 0) {
                alert('请先开启网格化以生成坐标数据');
                return;
            }
            openPipelineModal();
        });

        /**
         * 为 gridsOutput 分配物种密度，规则：
         * - 不同物种不会出现在同一网格
         * - 鸟类集中在盐沼(SaltMarsh)和水坑(WaterHole)及其周边格子
         * - 犀牛/大象分布在稀疏植被(SparseGrass)，成片出现，各自有密集区
         *   50% 的 SparseGrass 格子有犀牛或大象（不同时出现）
         *   生成 4 个大象密集区，5 个犀牛密集区
         * - 所有物种远离道路格子（Road 及其直接邻居不分配物种）
         * - 其他格子所有物种密度为 0
         *
         * @param {Array} grids - gridsOutput 数组（已含 terrain_type 和 neighbors 信息）
         * @param {Array} speciesNames - 物种名列表
         * @param {Map}   gridIdMap - gridId(marker) → gridsOutput index 的映射
         * @param {Map}   markerNeighbors - marker gridId → neighbor marker gridId[]
         */
        function assignSpeciesDensities(grids, speciesNames, gridIdMap, markerNeighbors) {
            grids.forEach(g => { g.species_densities = {}; speciesNames.forEach(sp => { g.species_densities[sp] = 0.0; }); });
            if (speciesNames.length === 0) return;
            const roadMarkerIds = new Set();
            gridCoordinates.forEach(mg => {
                const color = gridColorMap.get(mg.gridId);
                if (color === '#a855f7' || color === '#f97316') {
                    roadMarkerIds.add(mg.gridId);
                    (markerNeighbors.get(mg.gridId) || []).forEach(nb => roadMarkerIds.add(nb));
                }
            });
            const outputIdxToMarkerId = new Map();
            gridCoordinates.forEach(mg => { if (gridIdMap.has(mg.gridId)) outputIdxToMarkerId.set(gridIdMap.get(mg.gridId), mg.gridId); });
            const isRoadProhibited = idx => { const mid = outputIdxToMarkerId.get(idx); return mid !== undefined && roadMarkerIds.has(mid); };
            const wetMarkerIds = new Set();
            gridCoordinates.forEach(mg => {
                const color = gridColorMap.get(mg.gridId);
                if (color === '#06b6d4' || color === '#3b82f6') {
                    wetMarkerIds.add(mg.gridId);
                    (markerNeighbors.get(mg.gridId) || []).forEach(nb => wetMarkerIds.add(nb));
                }
            });
            const birdSp = speciesNames.find(s => s.toLowerCase().includes('bird'));
            if (birdSp) {
                const saltMarshIds = new Set();
                gridCoordinates.forEach(mg => {
                    if (gridColorMap.get(mg.gridId) === '#06b6d4') {
                        saltMarshIds.add(mg.gridId);
                        (markerNeighbors.get(mg.gridId) || []).forEach(nb => saltMarshIds.add(nb));
                    }
                });
                grids.forEach((g, idx) => {
                    if (isRoadProhibited(idx)) return;
                    const mid = outputIdxToMarkerId.get(idx);
                    if (mid && saltMarshIds.has(mid) && Math.random() < 0.10)
                        g.species_densities[birdSp] = parseFloat((0.5 + Math.random() * 0.5).toFixed(2));
                });
            }
            const rhinoSp = speciesNames.find(s => s.toLowerCase().includes('rhino'));
            const elephantSp = speciesNames.find(s => s.toLowerCase().includes('elephant'));
            const candidateIndices = grids.map((g, idx) => ({ g, idx }))
                .filter(({ g, idx }) => {
                    if (isRoadProhibited(idx)) return false;
                    if (!speciesNames.every(sp => g.species_densities[sp] === 0.0)) return false;
                    const mid = outputIdxToMarkerId.get(idx);
                    return mid && wetMarkerIds.has(mid);
                }).map(({ idx }) => idx);
            const maxCount = Math.max(1, Math.floor(grids.length * 0.05));
            const shuffled = candidateIndices.slice().sort(() => Math.random() - 0.5);
            const selected = shuffled.slice(0, Math.min(maxCount, shuffled.length));
            if (selected.length === 0) return;
            const NUM_ELEPHANT_ZONES = 2, NUM_RHINO_ZONES = 3, totalZones = 5;
            const zoneCenters = [];
            const step = Math.max(1, Math.floor(selected.length / totalZones));
            for (let z = 0; z < totalZones && z * step < selected.length; z++) zoneCenters.push(selected[z * step]);
            const getRC = idx => { const mid = outputIdxToMarkerId.get(idx); const mg = gridCoordinates.find(m => m.gridId === mid); return mg ? { row: mg.row, col: mg.col } : { row: 0, col: 0 }; };
            const dist2 = (a, b) => (a.row - b.row) ** 2 + (a.col - b.col) ** 2;
            const eCenters = zoneCenters.slice(0, NUM_ELEPHANT_ZONES).map(getRC);
            const rCenters = zoneCenters.slice(NUM_ELEPHANT_ZONES).map(getRC);
            selected.forEach(idx => {
                const rc = getRC(idx);
                const minE = eCenters.length ? Math.min(...eCenters.map(c => dist2(rc, c))) : Infinity;
                const minR = rCenters.length ? Math.min(...rCenters.map(c => dist2(rc, c))) : Infinity;
                const g = grids[idx];
                if (elephantSp && minE <= minR) g.species_densities[elephantSp] = parseFloat((0.4 + Math.random() * 0.6).toFixed(2));
                else if (rhinoSp) g.species_densities[rhinoSp] = parseFloat((0.4 + Math.random() * 0.6).toFixed(2));
            });
        }

        // 默认物种列表
        const defaultSpecies = [
            { name: 'rhino',    weight: 0.5, rainy: 1.2, dry: 1.0 },
            { name: 'elephant', weight: 0.3, rainy: 1.3, dry: 0.9 },

        ];

        function addSpeciesRow(name='', weight=0.3, rainy=1.0, dry=1.0) {
