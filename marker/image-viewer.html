        function buildPipelineJson() {
            const getValue = id => document.getElementById(id).value;
            const getInt = id => parseInt(getValue(id));
            const getFloat = id => parseFloat(getValue(id));

            // ---- 收集物种配置 ----
            const speciesConfig = {};
            const speciesNames = [];
            document.querySelectorAll('#speciesRows > div').forEach(row => {
                const name   = row.querySelector('.sp-name').value.trim();
                const weight = parseFloat(row.querySelector('.sp-weight').value);
                const rainy  = parseFloat(row.querySelector('.sp-rainy').value);
                const dry    = parseFloat(row.querySelector('.sp-dry').value);
                if (name) {
                    speciesConfig[name] = { weight, rainy_season_multiplier: rainy, dry_season_multiplier: dry };
                    speciesNames.push(name);
                }
            });

            // 收集所有在 presetColors 里有颜色标注的格子（保护区内）
            const coloredGrids = gridCoordinates.filter(g =>
                gridColorMap.has(g.gridId) && presetColors.includes(gridColorMap.get(g.gridId))
            );
            const uncoloredGrids = gridCoordinates.filter(g => !coloredGrids.includes(g));

            // 计算地图尺寸（行列范围）
            const allGrids = gridCoordinates;
            const rows = allGrids.map(g => g.row);
            const cols = allGrids.map(g => g.col);
            const minRow = Math.min(...rows), maxRow = Math.max(...rows);
            const minCol = Math.min(...cols), maxCol = Math.max(...cols);
            const mapHeight = maxRow - minRow + 1;
            const mapWidth = maxCol - minCol + 1;

            // 道路/水源位置（用于 riskIndex 距离计算，坐标归一化到 0-based）
            const roadLocations = [];
            const waterLocations = [];
            for (const g of coloredGrids) {
                const color = gridColorMap.get(g.gridId);
                const x = g.col - minCol;
                const y = maxRow - g.row; // riskIndex y 轴向上
                if (color === '#a855f7' || color === '#f97316') roadLocations.push([x, y]);
                if (color === '#3b82f6') waterLocations.push([x, y]);
            }

            // 计算边界格子坐标（邻居数 < 6 的格子，即不规则边界）
            // 建立 marker gridId → 已导出格子集合，用于判断邻居是否在保护区内
            const exportedMarkerIds = new Set(coloredGrids.map(g => g.gridId));
            const boundaryLocations = [];
            for (const g of coloredGrids) {
                const neighbors = g.neighbors || [];
                const isBoundary = neighbors.length < 6 ||
                    neighbors.some(nb => !exportedMarkerIds.has(nb));
                if (isBoundary) {
                    const x = g.col - minCol;
                    const y = maxRow - g.row;
                    boundaryLocations.push({ x, y, original_grid_id: g.gridId });
                }
            }

            // 构建网格列表（只导出已标注地形的格子）
            let gridId = 0;
            const gridsOutput = [];

            // 用 row/col 建立 offset 坐标系，转换为六边形轴坐标 q/r
            for (const g of allGrids) {
                // 跳过不在 presetColors 里的格子（围栏外或未标注）
                if (!gridColorMap.has(g.gridId) || !presetColors.includes(gridColorMap.get(g.gridId))) continue;
                const row = g.row - minRow;
                const col = g.col - minCol;
                const x = col;
                const y = mapHeight - 1 - row; // riskIndex y 轴向上

                // 六边形轴坐标（even-r offset → axial）
                // r 从下到上递增（与 generate_map.py 和可视化脚本一致）
                const r_hex = mapHeight - 1 - row;
                const q_hex = col - Math.floor(r_hex / 2);

                const color = gridColorMap.get(g.gridId); // 已确保有颜色
                const terrainType = colorToTerrainType.get(color) || 'SparseGrass';
                const vegType = colorToVegetationType.get(color) || 'GRASSLAND';
                const envDef = colorToEnvDefaults.get(color) || { fire_risk: 0.3, terrain_complexity: 0.2 };

                // 物种密度先置 0，后续由 assignSpeciesDensities 统一分配
                const speciesDef = {};
                speciesNames.forEach(sp => { speciesDef[sp] = 0.0; });

                gridsOutput.push({
                    grid_id: gridId,
                    original_grid_id: g.gridId,
                    q: q_hex,
                    r: r_hex,
                    x: x,
                    y: y,
                    hex_size: g.hexSizeNatural || hexSize,
                    terrain_type: terrainType,
                    fire_risk: envDef.fire_risk,
                    terrain_complexity: envDef.terrain_complexity,
                    vegetation_type: vegType,
                    species_densities: speciesDef,
                    _markerGridId: g.gridId   // 临时字段，供 assignSpeciesDensities 使用
                });
                gridId++;
                gridId++;
            }

            // 建立 marker gridId → gridsOutput index 的映射
            const gridIdMap = new Map();
            gridsOutput.forEach((g, idx) => {
                if (g._markerGridId !== undefined) gridIdMap.set(g._markerGridId, idx);
            });

            // 建立 marker gridId → neighbor marker gridId[] 的映射
            const markerNeighbors = new Map();
            gridCoordinates.forEach(mg => {
                markerNeighbors.set(mg.gridId, mg.neighbors || []);
            });

            // 分配物种密度
            assignSpeciesDensities(gridsOutput, speciesNames, gridIdMap, markerNeighbors);

            // 清理临时字段
            gridsOutput.forEach(g => delete g._markerGridId);

            const output = {
                map_config: {
                    map_width: mapWidth,
                    map_height: mapHeight,
                    boundary_type: "RECTANGLE",
                    road_locations: roadLocations,
                    water_locations: waterLocations,
                    boundary_locations: boundaryLocations
                },
                time: {
                    hour_of_day: getInt('pi_hour'),
                    season: getValue('pi_season')
                },
                use_temporal_factors: document.getElementById('pi_temporal').checked,
                species_config: speciesConfig,
                constraints: {
                    total_patrol: getInt('pi_patrol'),
                    total_camps: getInt('pi_camps'),
                    max_rangers_per_camp: getInt('pi_rangers_per_camp'),
                    total_cameras: getInt('pi_cameras'),
                    total_drones: getInt('pi_drones'),
                    total_fence_length: getFloat('pi_fence')
                },
                coverage_params: {
                    patrol_radius: getFloat('pi_patrol_radius'),
                    drone_radius: getFloat('pi_drone_radius'),
                    camera_radius: getFloat('pi_camera_radius'),
                    fence_protection: getFloat('pi_fence_protection'),
                    wp: getFloat('pi_wp'),
                    wd: getFloat('pi_wd'),
                    wc: getFloat('pi_wc'),
                    wf: getFloat('pi_wf')
                },
                dssa_config: {
                    population_size: getInt('pi_pop_size'),
                    max_iterations: getInt('pi_max_iter'),
                    producer_ratio: getFloat('pi_producer_ratio'),
                    scout_ratio: getFloat('pi_scout_ratio'),
                    ST: getFloat('pi_ST'),
                    R2: getFloat('pi_R2')
                },
                grids: gridsOutput
            };

            const dataStr = JSON.stringify(output, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'pipeline_input.json';
            link.click();
            URL.revokeObjectURL(url);
            closePipelineModal();
        }
    </script>

    <!-- Pipeline 配置 Modal -->
    <div id="pipelineModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);z-index:2000;justify-content:center;align-items:center;">
        <div style="background:#2a2a2a;border-radius:12px;padding:28px 32px;width:560px;max-height:90vh;overflow-y:auto;color:#fff;font-size:0.9rem;">
            <h2 style="color:#f59e0b;margin-bottom:20px;font-size:1.1rem;">🚀 导出 Pipeline 输入 JSON</h2>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">

                <!-- 时间配置 -->
                <div style="grid-column:1/-1;color:#aaa;font-size:0.8rem;border-bottom:1px solid #444;padding-bottom:4px;margin-top:4px;">时间配置</div>
                <label>时间（小时 0-23）
                    <input id="pi_hour" type="number" min="0" max="23" value="12" style="width:100%;margin-top:4px;background:#1a1a1a;border:1px solid #444;color:#fff;padding:6px;border-radius:4px;">
                </label>
                <label>季节
                    <select id="pi_season" style="width:100%;margin-top:4px;background:#1a1a1a;border:1px solid #444;color:#fff;padding:6px;border-radius:4px;">
                        <option value="DRY">旱季 (DRY)</option>
                        <option value="RAINY">雨季 (RAINY)</option>
                    </select>
                </label>
                <label style="grid-column:1/-1;display:flex;align-items:center;gap:8px;">
                    <input id="pi_temporal" type="checkbox">
                    启用昼夜/季节时间因子
                </label>

                <!-- 资源约束 -->
                <div style="grid-column:1/-1;color:#aaa;font-size:0.8rem;border-bottom:1px solid #444;padding-bottom:4px;margin-top:8px;">资源约束</div>
                <label>巡逻人员总数
                    <input id="pi_patrol" type="number" min="0" value="20" style="width:100%;margin-top:4px;background:#1a1a1a;border:1px solid #444;color:#fff;padding:6px;border-radius:4px;">
                </label>
                <label>营地总数
                    <input id="pi_camps" type="number" min="0" value="5" style="width:100%;margin-top:4px;background:#1a1a1a;border:1px solid #444;color:#fff;padding:6px;border-radius:4px;">
                </label>
                <label>每营地最大人员
                    <input id="pi_rangers_per_camp" type="number" min="1" value="5" style="width:100%;margin-top:4px;background:#1a1a1a;border:1px solid #444;color:#fff;padding:6px;border-radius:4px;">
                </label>
                <label>摄像头总数
                    <input id="pi_cameras" type="number" min="0" value="10" style="width:100%;margin-top:4px;background:#1a1a1a;border:1px solid #444;color:#fff;padding:6px;border-radius:4px;">
                </label>
                <label>无人机总数
                    <input id="pi_drones" type="number" min="0" value="3" style="width:100%;margin-top:4px;background:#1a1a1a;border:1px solid #444;color:#fff;padding:6px;border-radius:4px;">
                </label>
                <label>围栏总长度
                    <input id="pi_fence" type="number" min="0" value="50" style="width:100%;margin-top:4px;background:#1a1a1a;border:1px solid #444;color:#fff;padding:6px;border-radius:4px;">
                </label>

                <!-- 覆盖参数 -->
                <div style="grid-column:1/-1;color:#aaa;font-size:0.8rem;border-bottom:1px solid #444;padding-bottom:4px;margin-top:8px;">覆盖参数</div>
                <label>巡逻半径
                    <input id="pi_patrol_radius" type="number" step="0.1" value="5.0" style="width:100%;margin-top:4px;background:#1a1a1a;border:1px solid #444;color:#fff;padding:6px;border-radius:4px;">
                </label>
                <label>无人机半径
                    <input id="pi_drone_radius" type="number" step="0.1" value="8.0" style="width:100%;margin-top:4px;background:#1a1a1a;border:1px solid #444;color:#fff;padding:6px;border-radius:4px;">
                </label>
                <label>摄像头半径
                    <input id="pi_camera_radius" type="number" step="0.1" value="3.0" style="width:100%;margin-top:4px;background:#1a1a1a;border:1px solid #444;color:#fff;padding:6px;border-radius:4px;">
                </label>
                <label>围栏保护系数
                    <input id="pi_fence_protection" type="number" step="0.1" min="0" max="1" value="0.5" style="width:100%;margin-top:4px;background:#1a1a1a;border:1px solid #444;color:#fff;padding:6px;border-radius:4px;">
                </label>
                <label>巡逻权重 wp
                    <input id="pi_wp" type="number" step="0.05" min="0" max="1" value="0.3" style="width:100%;margin-top:4px;background:#1a1a1a;border:1px solid #444;color:#fff;padding:6px;border-radius:4px;">
                </label>
                <label>无人机权重 wd
                    <input id="pi_wd" type="number" step="0.05" min="0" max="1" value="0.3" style="width:100%;margin-top:4px;background:#1a1a1a;border:1px solid #444;color:#fff;padding:6px;border-radius:4px;">
                </label>
                <label>摄像头权重 wc
                    <input id="pi_wc" type="number" step="0.05" min="0" max="1" value="0.2" style="width:100%;margin-top:4px;background:#1a1a1a;border:1px solid #444;color:#fff;padding:6px;border-radius:4px;">
                </label>
                <label>围栏权重 wf
                    <input id="pi_wf" type="number" step="0.05" min="0" max="1" value="0.2" style="width:100%;margin-top:4px;background:#1a1a1a;border:1px solid #444;color:#fff;padding:6px;border-radius:4px;">
                </label>

                <!-- 物种配置 -->
                <div style="grid-column:1/-1;color:#aaa;font-size:0.8rem;border-bottom:1px solid #444;padding-bottom:4px;margin-top:8px;">
                    珍稀物种配置
                    <button onclick="addSpeciesRow()" style="margin-left:10px;background:#3a3a3a;color:#4ade80;border:1px solid #4ade80;padding:2px 8px;border-radius:4px;cursor:pointer;font-size:0.75rem;">+ 添加物种</button>
                </div>
                <div style="grid-column:1/-1;">
                    <div style="display:grid;grid-template-columns:1fr 0.6fr 0.6fr 0.6fr 28px;gap:6px;margin-bottom:4px;color:#666;font-size:0.75rem;padding:0 2px;">
                        <span>物种名称</span><span>保护权重</span><span>雨季系数</span><span>旱季系数</span><span></span>
                    </div>
                    <div id="speciesRows"></div>
                </div>

                <!-- DSSA 优化参数 -->
                <div style="grid-column:1/-1;color:#aaa;font-size:0.8rem;border-bottom:1px solid #444;padding-bottom:4px;margin-top:8px;">DSSA 优化参数</div>
                <label>种群大小
                    <input id="pi_pop_size" type="number" min="10" value="50" style="width:100%;margin-top:4px;background:#1a1a1a;border:1px solid #444;color:#fff;padding:6px;border-radius:4px;">
                </label>
                <label>最大迭代次数
                    <input id="pi_max_iter" type="number" min="10" value="100" style="width:100%;margin-top:4px;background:#1a1a1a;border:1px solid #444;color:#fff;padding:6px;border-radius:4px;">
                </label>
                <label>生产者比例
                    <input id="pi_producer_ratio" type="number" step="0.05" min="0" max="1" value="0.2" style="width:100%;margin-top:4px;background:#1a1a1a;border:1px solid #444;color:#fff;padding:6px;border-radius:4px;">
                </label>
                <label>侦察者比例
                    <input id="pi_scout_ratio" type="number" step="0.05" min="0" max="1" value="0.2" style="width:100%;margin-top:4px;background:#1a1a1a;border:1px solid #444;color:#fff;padding:6px;border-radius:4px;">
                </label>
                <label>ST 阈值
                    <input id="pi_ST" type="number" step="0.05" min="0" max="1" value="0.8" style="width:100%;margin-top:4px;background:#1a1a1a;border:1px solid #444;color:#fff;padding:6px;border-radius:4px;">
                </label>
                <label>R2 参数
                    <input id="pi_R2" type="number" step="0.05" min="0" max="1" value="0.5" style="width:100%;margin-top:4px;background:#1a1a1a;border:1px solid #444;color:#fff;padding:6px;border-radius:4px;">
                </label>
            </div>

            <div style="margin-top:24px;display:flex;gap:12px;justify-content:flex-end;">
                <button onclick="closePipelineModal()" style="background:#3a3a3a;color:#fff;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:0.9rem;">取消</button>
                <button onclick="buildPipelineJson()" style="background:#f59e0b;color:#1a1a1a;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:0.9rem;font-weight:600;">📥 生成并下载</button>
            </div>
        </div>
    </div>
</body>
</html>
